# =============================================================================
# WORKFLOW CI/CD - MICROSERVICE .NET
# =============================================================================
# Fichier : .github/workflows/ci.yml
# Description : Pipeline complète de build, test, push Docker et déploiement VPS
# Auteur      : DevOps Team
# Version     : 1.0.1
# =============================================================================

name: 🚀 CI/CD Pipeline - .NET Microservice

# -----------------------------------------------------------------------------
# DÉCLENCHEURS
# -----------------------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement de déploiement'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ci-cd-${{ github.ref_name }}
  cancel-in-progress: true

# -----------------------------------------------------------------------------
# VARIABLES GLOBALES
# -----------------------------------------------------------------------------
env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: '8.0.x'
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}

# -----------------------------------------------------------------------------
# JOBS
# -----------------------------------------------------------------------------
jobs:
  # ==========================================================================
  # JOB 1 : QUALITÉ DU CODE & TESTS
  # ==========================================================================
  quality-and-test:
    name: 🔍 Qualité du Code & Tests
    runs-on: ubuntu-latest
    
    steps:
      # -----------------------------------------------------------------------
      # Étape 1.1 : Checkout du code
      # -----------------------------------------------------------------------
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour SonarQube / analyse de code

      # -----------------------------------------------------------------------
      # Étape 1.2 : Setup .NET SDK
      # -----------------------------------------------------------------------
      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # -----------------------------------------------------------------------
      # Étape 1.3 : Cache des packages NuGet
      # -----------------------------------------------------------------------
      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # -----------------------------------------------------------------------
      # Étape 1.4 : Restore des dépendances
      # -----------------------------------------------------------------------
      - name: 🔧 Restore des dépendances
        run: dotnet restore --locked-mode

      # -----------------------------------------------------------------------
      # Étape 1.5 : Build du projet
      # -----------------------------------------------------------------------
      - name: 🏗️ Build du projet
        run: dotnet build --no-restore --configuration Release

      # -----------------------------------------------------------------------
      # Étape 1.6 : Exécution des tests unitaires
      # -----------------------------------------------------------------------
      - name: 🧪 Tests unitaires
        run: dotnet test --no-build --verbosity normal

      # -----------------------------------------------------------------------
      # Étape 1.7 : Analyse de code statique (SonarCloud optionnel)
      # -----------------------------------------------------------------------
      
  # ==========================================================================
  # JOB 2 : BUILD & PUSH DE L'IMAGE DOCKER
  # ==========================================================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: quality-and-test
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      # -----------------------------------------------------------------------
      # Étape 2.1 : Checkout
      # -----------------------------------------------------------------------
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Étape 2.2 : Génération du numéro de version sémantique
      # -----------------------------------------------------------------------
      - name: 🔖 Génération de la version
        id: version
        run: |
          # Format : v1.2.3-sha court-date
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          VERSION="v1.0.${{ github.run_number }}-${SHORT_SHA}-${DATE}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version générée : $VERSION"

      # -----------------------------------------------------------------------
      # Étape 2.3 : Setup Docker Buildx
      # -----------------------------------------------------------------------
      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Étape 2.4 : Login au Docker Registry
      # -----------------------------------------------------------------------
      - name: 🔐 Login à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Étape 2.5 : Extraction des métadonnées Docker
      # -----------------------------------------------------------------------
      - name: 🏷️ Extraction des métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,suffix=,format=short

      # -----------------------------------------------------------------------
      # Étape 2.6 : Build et Push de l'image Docker
      # -----------------------------------------------------------------------
      - name: 🚀 Build & Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      # -----------------------------------------------------------------------
      # Étape 2.7 : Scan de sécurité de l'image (Trivy)
      # -----------------------------------------------------------------------
      - name: 🔒 Scan de sécurité Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      # -----------------------------------------------------------------------
      # Étape 2.8 : Upload des résultats de scan
      # -----------------------------------------------------------------------
      - name: 📤 Upload résultats Trivy
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================================================
  # JOB 3 : DÉPLOIEMENT SUR VPS
  # ==========================================================================
  deploy:
    name: 🚀 Déploiement sur VPS
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://api.votredomaine.com/health

    steps:
      # -----------------------------------------------------------------------
      # Étape 3.1 : Checkout pour récupérer les scripts de déploiement
      # -----------------------------------------------------------------------
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Étape 3.2 : Configuration de la clé SSH
      # -----------------------------------------------------------------------
      - name: 🔑 Configuration SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # -----------------------------------------------------------------------
      # Étape 3.3 : Déploiement via SSH
      # -----------------------------------------------------------------------
      - name: 🚀 Exécution du déploiement
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
          SERVICE_NAME: ${{ github.event.repository.name }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=30 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "bash /opt/deploy/scripts/deploy-service.sh \
               '${{ env.SERVICE_NAME }}' \
               '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}' \
               '${{ env.IMAGE_TAG }}'"

      # -----------------------------------------------------------------------
      # Étape 3.4 : Vérification post-déploiement (Health Check)
      # -----------------------------------------------------------------------
      - name: ✅ Health Check post-déploiement
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ github.event.repository.name }} 2>/dev/null || echo 'Pas de healthcheck configuré'"

  # ==========================================================================
  # JOB 4 : NOTIFICATIONS
  # ==========================================================================
  notify:
    name: 📢 Notification Telegram
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    
    steps:
      # -----------------------------------------------------------------------
      # Étape 4.1 : Notification de succès
      # -----------------------------------------------------------------------
      - name: ✅ Notification Succès
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *DÉPLOIEMENT RÉUSSI*
            
            🏷️ *Service* : `${{ github.event.repository.name }}`
            📦 *Version* : `${{ needs.build-and-push.outputs.version }}`
            👤 *Déployé par* : `${{ github.actor }}`
            📝 *Commit* : `${{ github.event.pull_request.title || github.event.head_commit.message || github.sha }}`
            🔗 *URL* : `${{ github.event.head_commit.url || github.server_url }}`
            
            ⏱️ *Durée* : `${{ github.run_duration }}`
            🖥️ *Environnement* : `${{ env.DEPLOY_ENV }}`
            
            _Le service est opérationnel._

      # -----------------------------------------------------------------------
      # Étape 4.2 : Notification d'échec
      # -----------------------------------------------------------------------
      - name: ❌ Notification Échec
        if: needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *DÉPLOIEMENT ÉCHOUÉ*
            
            🏷️ *Service* : `${{ github.event.repository.name }}`
            👤 *Déployé par* : `${{ github.actor }}`
            📝 *Commit* : `${{ github.event.pull_request.title || github.event.head_commit.message || github.sha }}`
            🔗 *Workflow* : `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            
            ⚠️ *Action requise* : Vérifier les logs GitHub Actions.
            
            _Le service précédent est toujours actif (rollback implicite)._

      # -----------------------------------------------------------------------
      # Étape 4.3 : Nettoyage des clés SSH
      # -----------------------------------------------------------------------
      - name: 🧹 Nettoyage des clés SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key