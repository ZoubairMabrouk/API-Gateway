# ============================================================
# CI/CD Pipeline — API Gateway (.NET)
# Repository : https://github.com/<your-org>/API-Gateway
# Trigger    : Push sur les branches main/develop/master
# Author     : DevOps Pipeline Generator
# Version    : 1.0.0
# ============================================================

name: 🚀 API Gateway — Build & Deploy

on:
  push:
    branches:
      - main
      - develop
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forcer la reconstruction de l image Docker'
        required: false
        default: 'false'

# Variables d environnement globales au workflow
env:
  SERVICE_NAME: api-gateway
  DOCKER_IMAGE: api-gateway
  COMPOSE_SERVICE: gateway
  DEPLOY_PATH: /opt/microservices
  DOTNET_VERSION: '8.0'

# Permissions minimales (principe du moindre privilège)
permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Analyse de la qualité du code
  # ─────────────────────────────────────────────
  code-quality:
    name: 🔍 Code Quality & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟦 Configuration .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restauration des dépendances NuGet
        run: dotnet restore API-Gateway.csproj

      - name: 🔨 Build de vérification
        run: dotnet build --no-restore --configuration Release API-Gateway.csproj

      - name: 🧪 Exécution des tests unitaires
        run: |
          dotnet test --no-build \
            --configuration Release \
            --verbosity normal \
            API-Gateway.csproj
        continue-on-error: true

      - name: 📊 Publication des résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number}}
          path: '**/TestResults/*.trx'
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2 : Build & Push de l image Docker
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4

      - name: 🏷️ Calcul de la version de l image
        id: version
        run: |
          VERSION="$(date +'%Y.%m.%d')-${GITHUB_SHA::8}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📌 Version calculée : ${VERSION}"

      - name: 🔧 Configuration de Docker Buildx (multi-plateforme)
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: 🔐 Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zoubairmabrouk/${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=API Gateway
            org.opencontainers.image.description=Passerelle API pour la plateforme
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: 🏗️ Build et Push de l image Docker
        run: |
          docker compose -f docker-compose.yml build --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') --build-arg VCS_REF=${{ github.sha }} --build-arg VERSION=${{ steps.version.outputs.version }}
          docker compose -f docker-compose.yml push

      - name: 🔒 Scan de sécurité Trivy (vulnérabilités)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/zoubairmabrouk/${{ env.DOCKER_IMAGE }}:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  versioning:
    name: Create Release Version
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      version-tag: ${{ steps.version.outputs.version-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +%Y.%m.%d.%H%M)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version-tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version-tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in this Release
            - API Gateway image published
            - See commit history for details
            - Docker image: `ghcr.io/zoubairmabrouk/${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 3 : Déploiement sur le VPS via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          key: ${{ secrets.VPS_SSH_KEY }}
          username: ${{ secrets.VPS_USER }}
          port: 22
          debug: true
          timeout: 180s
          command_timeout: 30m
          script: |
            set -e

            echo "Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image"
            docker pull ghcr.io/zoubairmabrouk/${{ env.DOCKER_IMAGE }}:latest

            echo "Stopping existing container if present"
            docker rm -f api-gateway || true

            echo "Running latest container"
            docker run -d \
              --name api-gateway \
              --restart unless-stopped \
              -p 8080:8080 \
              -e "ASPNETCORE_ENVIRONMENT=Production" \
              ghcr.io/zoubairmabrouk/${{ env.DOCKER_IMAGE }}:latest

            echo "Deployment completed successfully"
            docker ps --filter "name=api-gateway"

  # ─────────────────────────────────────────────
  # JOB 4 : Notifications Telegram
  # ─────────────────────────────────────────────
  notify-success:
    name: 📬 Telegram — Succès
    runs-on: ubuntu-latest
    needs: [docker-build, deploy]
    if: success()
    steps:
      - name: ✅ Notification succès
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "✅ *API Gateway Déployé*\n\n🏷️ *Service* : API Gateway\n📦 *Version* : `${{ needs.docker-build.outputs.image_version }}`\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : `${GITHUB_SHA::8}`\n🔗 [Voir workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "parse_mode": "Markdown"
            }'

  notify-failure:
    name: 📬 Telegram — Échec
    runs-on: ubuntu-latest
    needs: [code-quality, docker-build, deploy]
    if: failure()
    steps:
      - name: ❌ Notification échec
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "❌ *API Gateway — Échec Déploiement*\n\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : `${GITHUB_SHA::8}`\n🔗 *Workflow* : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "parse_mode": "Markdown"
            }'
